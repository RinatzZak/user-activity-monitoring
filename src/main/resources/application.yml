debezium:
  host: http://localhost:8083/connectors/
  name: postgres-connector
  database:
    hostname: localhost
    port: 5432
    user: user
    password: password
    dbname: userdb
    schema: public
  topic-prefix: postgres-server

server:
  port: 8080

logging:
  level:
    com.user.activity.monitoring: DEBUG
    org.apache.kafka: INFO
    io.debezium: DEBUG
    org.springframework.kafka: INFO
    liquibase: DEBUG
    root: INFO
    #sun.security.ssl: DEBUG

management:
  endpoints:
    health:
      show-details: always
    web:
      exposure:
        include: "health,info,metrics,prometheus"