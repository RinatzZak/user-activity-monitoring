app:
  block:
    threshold: 5
  storage:
    strategy: IN_MEMORY  # IN_MEMORY, в дальнейшем попробовать другие варианты

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  liquibase:
    enabled: true
    change-log: classpath:/changelog/db.changelog-master.xml

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  #Для работы без сертификатов
  kafka:
    bootstrap-servers: localhost:9093
    properties:
      security:
        protocol: PLAINTEXT
    topics:
      cdc-topic: postgres-server.public.users
      output-topic-tumbling: user-activity-stats-tumbling
      output-topic-hopping: user-activity-stats-hopping
      output-topic-session: user-activity-stats-session

    streams:
      application-id: user-activity-streams
      auto-startup: true
      properties:
        default:
          key:
            serde: org.apache.kafka.common.serialization.Serdes$StringSerde
          value:
            serde: org.springframework.kafka.support.serializer.JsonSerde

